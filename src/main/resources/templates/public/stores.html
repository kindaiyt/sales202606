<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title th:text="${title != null ? title : '店舗一覧'}"></title>
</head>
<body>
<th:block layout:fragment="content">

    <main class="content">
        <h1 th:text="${title != null ? title : '店舗一覧'}"></h1>

        <!-- 店舗0件のときは、ソートUI/表を出さずメッセージ -->
        <div th:if="${!hasStores}" class="store-info">
            <p>店舗が登録されていません。</p>
        </div>

        <!-- 店舗がある時だけ：ソートUI -->
        <div th:if="${hasStores}" class="store-actions">

            <p class="sort-help">
                各店舗名をクリックすると、商品一覧を確認できます。
                タイトル行の「店舗名」もしくは並べ替えボタンをクリックすると、それぞれの項目で並べ替えて表示することができます。
                デフォルトの並び順に戻すこともできます。
            </p>

            <!-- スマホ用ソートボタン（店舗名のみ） -->
            <div class="sort-bar">
                <form th:action="@{/stores/view-sort}" method="post" class="sort-bar__form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="sort" value="name">
                    <input type="hidden" name="dir"
                           th:value="${sort == 'name' and dir == 'asc' ? 'desc' : 'asc'}">
                    <input type="hidden"
                           name="redirectTo"
                           th:value="@{/stores/{storeType}(storeType=${storeType})}">
                    <button type="submit" class="btn btn-sm sort-bar__btn">
                        店舗名で並べ替え
                        <span th:if="${sort == 'name'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                    </button>
                </form>
            </div>

            <!-- 並び替え解除 -->
            <form th:if="${sort != null}"
                  th:action="@{/stores/view-sort/clear}"
                  method="post"
                  class="product-sort-clear-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden"
                       name="redirectTo"
                       th:value="@{/stores/{storeType}(storeType=${storeType})}">
                <button type="submit" class="btn btn-secondary btn-sm">並び替え解除</button>
            </form>

        </div>

        <!-- 店舗がある時だけ：表（店舗名＋説明のみ） -->
        <div th:if="${hasStores}" class="table-card">
            <table class="store-table">
                <thead>
                <tr>
                    <th>
                        <form th:action="@{/stores/view-sort}" method="post" style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="sort" value="name">
                            <input type="hidden" name="dir"
                                   th:value="${sort == 'name' and dir == 'asc' ? 'desc' : 'asc'}">
                            <input type="hidden"
                                   name="redirectTo"
                                   th:value="@{/stores/{storeType}(storeType=${storeType})}">
                            <button type="submit" class="th-sort-btn">
                                店舗名
                                <span th:if="${sort == 'name'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                            </button>
                        </form>
                    </th>

                    <th>店舗の説明</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="store : ${stores}">
                    <td class="cell-name" data-label="店舗名">
                        <a th:href="@{/stores/{storeType}/{url}(storeType=${storeType}, url=${store.url})}"
                           th:text="${store.name}"></a>
                    </td>

                    <td data-label="店舗の説明"
                        th:text="${#strings.isEmpty(store.note) ? '-' : store.note}">
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="form-actions mt-16">
            <a th:href="@{/stores}" class="btn btn-secondary">店舗種別選択へ戻る</a>
        </div>
    </main>

</th:block>
</body>
</html>
