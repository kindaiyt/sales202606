<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>店舗ページ</title>
</head>
<body>
<th:block layout:fragment="content">

    <main class="content">
        <h1>店舗ページ</h1>

        <div class="store-info" th:if="${store != null}">
            <div class="store-note-box">
                <h2 th:text="'店舗名: ' + ${store.name}"></h2>

                <h2 class="section-title">店舗の説明</h2>

                <!-- 編集リンクなし：表示のみ -->
                <div class="note-display" th:utext="${noteWithLinks}"></div>

                <!-- 商品0件なら、ソートUI/表は出さずメッセージ -->
                <div th:if="${!hasProducts}" class="store-info" style="margin-top:14px;">
                    <p>商品が登録されていません。</p>
                </div>

                <!-- 商品がある時だけ：ソートUI -->
                <div th:if="${hasProducts}" class="store-actions">

                    <p class="product-sort-help">
                        タイトル行の「商品名」「価格」もしくは並べ替えボタンをクリックすると、それぞれの項目で並べ替えて表示することができます。
                        デフォルトの並び順に戻すこともできます。
                    </p>

                    <!-- スマホ用ソートボタン（商品名/価格） -->
                    <div class="sort-bar">
                        <form th:action="@{|/stores/${store.url}/view-sort|}" method="post" class="sort-bar__form">
                            <input type="hidden" name="sort" value="name">
                            <input type="hidden" name="dir"
                                   th:value="${sort == 'name' and dir == 'asc' ? 'desc' : 'asc'}">
                            <button type="submit" class="btn btn-sm sort-bar__btn">
                                商品名で並べ替え
                                <span th:if="${sort == 'name'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                            </button>
                        </form>

                        <form th:action="@{|/stores/${store.url}/view-sort|}" method="post" class="sort-bar__form">
                            <input type="hidden" name="sort" value="price">
                            <input type="hidden" name="dir"
                                   th:value="${sort == 'price' and dir == 'asc' ? 'desc' : 'asc'}">
                            <button type="submit" class="btn btn-sm sort-bar__btn">
                                価格で並べ替え
                                <span th:if="${sort == 'price'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                            </button>
                        </form>
                    </div>

                    <!-- 並び替え解除 -->
                    <form th:if="${sort != null}"
                          th:action="@{|/stores/${store.url}/view-sort/clear|}"
                          method="post"
                          class="product-sort-clear-form">
                        <button type="submit" class="btn btn-secondary btn-sm">
                            並び替え解除
                        </button>
                    </form>

                </div>
            </div>

            <!-- 商品がある時だけ：表 -->
            <div th:if="${hasProducts}">
                <table class="store-table">
                    <thead>
                    <tr>
                        <th>
                            <form th:action="@{|/stores/${store.url}/view-sort|}" method="post" style="display:inline;">
                                <input type="hidden" name="sort" value="name">
                                <input type="hidden" name="dir"
                                       th:value="${sort == 'name' and dir == 'asc' ? 'desc' : 'asc'}">
                                <button type="submit" class="th-sort-btn">
                                    商品名
                                    <span th:if="${sort == 'name'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                                </button>
                            </form>
                        </th>

                        <th>
                            <form th:action="@{|/stores/${store.url}/view-sort|}" method="post" style="display:inline;">
                                <input type="hidden" name="sort" value="price">
                                <input type="hidden" name="dir"
                                       th:value="${sort == 'price' and dir == 'asc' ? 'desc' : 'asc'}">
                                <button type="submit" class="th-sort-btn">
                                    価格
                                    <span th:if="${sort == 'price'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                                </button>
                            </form>
                        </th>

                        <th>説明</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="product : ${products}">
                        <td class="cell-name" data-label="商品名" th:text="${product.name}"></td>

                        <td class="cell-url" data-label="価格">
                            <span class="url-badge" th:text="${product.price} + '円'"></span>
                        </td>

                        <td class="cell-note" data-label="説明"
                            th:text="${#strings.isEmpty(product.note) ? '-' : product.note}">
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>

        <div class="form-actions mt-16">
            <a th:href="@{/stores}" class="btn btn-secondary">店舗一覧に戻る</a>
        </div>

    </main>

</th:block>
</body>
</html>
