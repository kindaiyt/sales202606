<header th:fragment="header" class="site-header">
    <div class="logo">
        <a href="/" class="logo-link">2026年明石北高校文化祭店舗案内</a>
    </div>

    <div class="menu-container">
        <button id="hamburger" class="menu-toggle">☰</button>

        <div class="menu" id="menu">

            <!-- 未ログイン -->
            <div th:if="${userName == 'ゲスト'}" class="menu-links">
                <a href="/oauth2/authorization/google" class="menu-item">
                    ログイン
                </a>
            </div>

            <!-- ログイン済 -->
            <div th:if="${userName != 'ゲスト'}" class="menu-links">

                <button id="logoutBtn" class="menu-item logout-item">
                    ログアウト
                </button>

                <a href="/users/me" class="menu-item">
                    マイページ
                </a>

                <!-- 管理者のみ -->
                <a th:if="${isAdmin}" href="/admin/users" class="menu-item">
                    ユーザー管理
                </a>

            </div>

        </div>
    </div>
</header>
