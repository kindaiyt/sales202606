<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>店舗ページ</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<th:block layout:fragment="content">

    <main class="content">
        <h1>店舗ページ</h1>

        <!-- store がある場合 -->
        <div th:if="${store != null}" class="store-info">

            <div class="store-note-box">

                <h2 th:text="'店舗名: ' + ${store.name}"></h2>

                <h2 class="section-title">店舗の説明</h2>

                <div class="note-display" th:utext="${noteWithLinks}"></div>

                <!-- ★ ここが肝：ボタンと説明文を同一カラムにする -->
                <div class="store-actions">
                    <a th:href="@{'/store/' + ${store.url} + '/note/edit'}"
                       class="btn btn-sm store-edit-btn">
                        説明を編集
                    </a>

                    <!-- =========================
                         商品が 1件以上あるときだけ表示する領域
                         ========================= -->
                    <th:block th:if="${products != null and !#lists.isEmpty(products)}">

                        <p class="product-sort-help">
                            タイトル行の「商品名」「価格」もしくは並べ替えボタンをクリックすると、それぞれの項目で並べ替えて表示することができます。
                            デフォルトの並び順に戻すこともできます。
                        </p>

                        <div class="sort-bar">
                            <!-- 商品名ソート -->
                            <form th:action="@{|/store/${store.url}/view-sort|}" method="post" class="sort-bar__form">
                                <input type="hidden" name="sort" value="name">
                                <input type="hidden" name="dir"
                                       th:value="${sort == 'name' and dir == 'asc' ? 'desc' : 'asc'}">
                                <button type="submit" class="btn btn-sm sort-bar__btn">
                                    商品名で並べ替え
                                    <span th:if="${sort == 'name'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                                </button>
                            </form>

                            <!-- 価格ソート -->
                            <form th:action="@{|/store/${store.url}/view-sort|}" method="post" class="sort-bar__form">
                                <input type="hidden" name="sort" value="price">
                                <input type="hidden" name="dir"
                                       th:value="${sort == 'price' and dir == 'asc' ? 'desc' : 'asc'}">
                                <button type="submit" class="btn btn-sm sort-bar__btn">
                                    価格で並べ替え
                                    <span th:if="${sort == 'price'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                                </button>
                            </form>
                        </div>

                        <!-- 並び替え中だけ表示 -->
                        <form th:if="${sort != null}"
                              th:action="@{|/store/${store.url}/view-sort/clear|}"
                              method="post"
                              class="product-sort-clear-form">
                            <button type="submit" class="btn btn-secondary btn-sm">
                                並び替え解除
                            </button>
                        </form>

                    </th:block>

                    <!-- =========================
                         商品が 0件のときだけ表示
                         ========================= -->
                    <p th:if="${products == null or #lists.isEmpty(products)}"
                       class="product-sort-help">
                        商品が登録されていません。
                    </p>

                </div>
            </div>

            <!-- =========================
                 商品が 1件以上あるときだけテーブル表示
                 ========================= -->
            <table class="store-table"
                   th:if="${products != null and !#lists.isEmpty(products)}">
                <thead>
                <tr>
                    <th>
                        <form th:action="@{|/store/${store.url}/view-sort|}" method="post" style="display:inline;">
                            <input type="hidden" name="sort" value="name">
                            <input type="hidden" name="dir"
                                   th:value="${sort == 'name' and dir == 'asc' ? 'desc' : 'asc'}">
                            <button type="submit" class="th-sort-btn">
                                商品名
                                <span th:if="${sort == 'name'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                            </button>
                        </form>
                    </th>

                    <th>
                        <form th:action="@{|/store/${store.url}/view-sort|}" method="post" style="display:inline;">
                            <input type="hidden" name="sort" value="price">
                            <input type="hidden" name="dir"
                                   th:value="${sort == 'price' and dir == 'asc' ? 'desc' : 'asc'}">
                            <button type="submit" class="th-sort-btn">
                                価格
                                <span th:if="${sort == 'price'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                            </button>
                        </form>
                    </th>

                    <th>説明</th>
                    <th class="col-actions">操作</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="product : ${products}">
                    <td class="cell-name" data-label="商品名" th:text="${product.name}"></td>

                    <td class="cell-url" data-label="価格">
                        <span class="url-badge"
                              th:text="${product.price} + '円'"></span>
                    </td>

                    <td class="cell-note" data-label="説明"
                        th:text="${#strings.isEmpty(product.note) ? '-' : product.note}">
                    </td>

                    <td class="cell-actions" data-label="操作">
                        <div class="row-actions">
                            <a th:href="@{'/product/edit/' + ${product.id}}" class="btn btn-sm">編集</a>

                            <form th:action="@{'/product/delete/' + ${product.id}}"
                                  method="post"
                                  onsubmit="return confirm('本当に削除しますか？');">
                                <button type="submit" class="btn btn-sm btn-danger">削除</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>

        </div>

        <!-- store がない場合 -->
        <div th:if="${store == null}" class="store-info">
            <p>
                店舗情報が登録されていないか、Googleアカウントが朔風会に承認されていません。<br>
                ログインしているGoogleアカウントが正しいかどうか確かめてください。<br>
                正しい場合、
                <a href="mailto:sakufukai@gmail.com">sakufukai@gmail.com</a>
                までご連絡ください。
            </p>
        </div>

        <!-- 下のボタン -->
        <div class="form-actions mt-16" th:if="${store != null}">
            <a th:href="@{/product/add/{url}(url=${store.url})}" class="btn">商品追加</a>
            <a th:if="${hasProducts}"
               th:href="@{/product/sort/{url}(url=${store.url})}"
               class="btn">並べ替え</a>
            <a th:href="@{/store}" class="btn btn-secondary">店舗一覧に戻る</a>
        </div>

        <div class="form-actions mt-16" th:if="${store == null}">
            <a th:href="@{/store}" class="btn btn-secondary">店舗一覧に戻る</a>
        </div>

    </main>

</th:block>
</body>
</html>
