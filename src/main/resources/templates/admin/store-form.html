<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>店舗作成</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<th:block layout:fragment="content">

    <main class="content">
        <h1>新しい店舗を作成</h1>

        <!-- ★ action を /admin/stores/new に -->
        <form th:action="@{/admin/stores/new}" method="post">

            <div class="form-group">
                <label for="name">店舗名: </label>
                <input type="text"
                       id="name"
                       name="name"
                       placeholder="ここに店舗名を入力"
                       th:value="${name}">
                <div th:if="${nameError}" class="error-message" th:text="${nameError}"></div>
            </div>

            <div class="form-group">
                <label for="url">店舗URLの末尾になるID: </label>
                <input type="text"
                       id="url"
                       name="url"
                       placeholder="ここに店舗URLとなるIDを入力"
                       th:value="${url}">
                <div th:if="${urlError}" class="error-message" th:text="${urlError}"></div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn">作成</button>
                <a th:href="@{/admin/stores}" class="btn btn-secondary">戻る</a>
            </div>

        </form>
    </main>

</th:block>
</body>
</html>
