<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>店舗作成</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<th:block layout:fragment="content">

    <main class="content">
        <h1>新しい店舗を作成</h1>

        店舗の場所を表す画像は、店舗新規作成後の編集画面からアップロード可能です。

        <!-- ★ action を /admin/stores/new に -->
        <form th:action="@{/admin/stores/new}" method="post">

            <div class="form-group">
                <label for="name">店舗名: </label>
                <input type="text"
                       id="name"
                       name="name"
                       placeholder="ここに店舗名を入力"
                       th:value="${name}">
                <div th:if="${nameError}" class="error-message" th:text="${nameError}"></div>
            </div>

            <div class="form-group">
                <label for="url">店舗URLの末尾になるID: </label>
                <input type="text"
                       id="url"
                       name="url"
                       placeholder="ここに店舗URLとなるIDを入力"
                       th:value="${url}">
                <div th:if="${urlError}" class="error-message" th:text="${urlError}"></div>
            </div>

            <div class="form-group">
                <label for="locationName">文化祭中の場所を入力（例: 中庭、北校舎1階調理実習室）（省略可）: </label>
                <input type="text"
                       id="locationName"
                       name="locationName"
                       placeholder="ここに店舗の場所を入力（省略可）"
                       th:value="${locationName}">
            </div>

            <div class="form-group">
                <label>店舗種別: </label>

                <fieldset class="radio-inline-group">

                    <input id="storeType-student"
                           class="radio-inline__input"
                           type="radio"
                           name="storeType"
                           value="STUDENT"
                           th:checked="${storeType == null or storeType == 'STUDENT'}" />

                    <label class="radio-inline__label" for="storeType-student">
                        学生店舗
                    </label>

                    <input id="storeType-general"
                           class="radio-inline__input"
                           type="radio"
                           name="storeType"
                           value="GENERAL"
                           th:checked="${storeType == 'GENERAL'}" />

                    <label class="radio-inline__label" for="storeType-general">
                        一般店舗
                    </label>

                </fieldset>

                <div th:if="${storeTypeError}" class="error-message" th:text="${storeTypeError}"></div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn">作成</button>
                <a th:href="@{/admin/stores}" class="btn btn-secondary">戻る</a>
            </div>

        </form>
    </main>

</th:block>
</body>
</html>
