<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <meta charset="UTF-8">
    <title>ユーザー管理</title>
</head>

<body>
<th:block layout:fragment="content">

    <main class="content">
        <h1>ユーザー管理</h1>

        <div th:if="${error}" class="error-message" th:text="${error}"></div>

        <!-- ★説明文＋スマホ用並べ替えボタン＋解除 -->
        <div class="store-actions">
            <p class="product-sort-help">
                タイトル行の「メールアドレス」「名前」「現在のロール」もしくは並べ替えボタンをクリックすると、それぞれの項目で並べ替えて表示することができます。
                デフォルトの並び順に戻すこともできます。
            </p>

            <!-- スマホ用: 3つ横並び -->
            <div class="sort-bar">
                <!-- メール -->
                <form th:action="@{/admin/users/view-sort}" method="post" class="sort-bar__form">
                    <input type="hidden" name="sort" value="email">
                    <input type="hidden" name="dir"
                           th:value="${sort == 'email' and dir == 'asc' ? 'desc' : 'asc'}">
                    <button type="submit" class="btn btn-sm sort-bar__btn">
                        メールで並べ替え
                        <span th:if="${sort == 'email'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                    </button>
                </form>

                <!-- 名前 -->
                <form th:action="@{/admin/users/view-sort}" method="post" class="sort-bar__form">
                    <input type="hidden" name="sort" value="name">
                    <input type="hidden" name="dir"
                           th:value="${sort == 'name' and dir == 'asc' ? 'desc' : 'asc'}">
                    <button type="submit" class="btn btn-sm sort-bar__btn">
                        名前で並べ替え
                        <span th:if="${sort == 'name'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                    </button>
                </form>

                <!-- ロール -->
                <form th:action="@{/admin/users/view-sort}" method="post" class="sort-bar__form">
                    <input type="hidden" name="sort" value="role">
                    <input type="hidden" name="dir"
                           th:value="${sort == 'role' and dir == 'asc' ? 'desc' : 'asc'}">
                    <button type="submit" class="btn btn-sm sort-bar__btn">
                        ロールで並べ替え
                        <span th:if="${sort == 'role'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                    </button>
                </form>
            </div>

            <!-- 並び替え中だけ表示 -->
            <form th:if="${sort != null}"
                  th:action="@{/admin/users/view-sort/clear}"
                  method="post"
                  class="product-sort-clear-form">
                <button type="submit" class="btn btn-secondary btn-sm">
                    並び替え解除
                </button>
            </form>
        </div>

        <div class="table-card">
            <table class="store-table">
                <thead>
                <tr>
                    <!-- メールアドレス -->
                    <th>
                        <form th:action="@{/admin/users/view-sort}" method="post" style="display:inline;">
                            <input type="hidden" name="sort" value="email">
                            <input type="hidden" name="dir"
                                   th:value="${sort == 'email' and dir == 'asc' ? 'desc' : 'asc'}">
                            <button type="submit" class="th-sort-btn">
                                メールアドレス
                                <span th:if="${sort == 'email'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                            </button>
                        </form>
                    </th>
                    <!-- 名前 -->
                    <th>
                        <form th:action="@{/admin/users/view-sort}" method="post" style="display:inline;">
                            <input type="hidden" name="sort" value="name">
                            <input type="hidden" name="dir"
                                   th:value="${sort == 'name' and dir == 'asc' ? 'desc' : 'asc'}">
                            <button type="submit" class="th-sort-btn">
                                名前
                                <span th:if="${sort == 'name'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                            </button>
                        </form>
                    </th>
                    <!-- ロール -->
                    <th>
                        <form th:action="@{/admin/users/view-sort}" method="post" style="display:inline;">
                            <input type="hidden" name="sort" value="role">
                            <input type="hidden" name="dir"
                                   th:value="${sort == 'role' and dir == 'asc' ? 'desc' : 'asc'}">
                            <button type="submit" class="th-sort-btn">
                                現在のロール
                                <span th:if="${sort == 'role'}" th:text="${dir == 'asc' ? '▲' : '▼'}"></span>
                            </button>
                        </form>
                    </th>
                    <th class="col-actions">操作</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="user : ${users}">
                    <td data-label="メールアドレス" th:text="${user.email}"></td>
                    <td data-label="名前" th:text="${user.name}"></td>
                    <td data-label="現在のロール" th:text="${user.role}"></td>

                    <td class="cell-actions" data-label="ロールを変更">
                        <div class="row-actions">
                            <!-- 操作可能: 固定管理者でもなく、自分でもない -->
                            <form
                                    th:if="${(fixedAdmins == null || !fixedAdmins.contains(user.email))
                                            and (myEmail == null || myEmail != user.email)}"
                                    th:action="@{'/admin/users/' + ${user.email} + '/role'}"
                                    method="post"
                                    class="user-actions user-actions--role">

                                <select name="role">
                                    <option value="USER" th:selected="${user.role == 'USER'}">USER</option>
                                    <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">ADMIN</option>
                                </select>

                                <button type="submit" class="btn btn-sm">変更</button>
                            </form>

                            <!-- 固定管理者なら表示だけ（任意） -->
                            <span th:if="${fixedAdmins != null && fixedAdmins.contains(user.email)}"
                                  class="fixed-admin-label">
                                固定管理者
                            </span>

                            <!-- 自分自身 -->
                            <span th:if="${myEmail != null && myEmail == user.email}"
                                  class="fixed-admin-label">
                                自分
                            </span>

                            <!-- 削除ボタン: 固定管理者でもなく自分でもない -->
                            <form th:if="${(fixedAdmins == null || !fixedAdmins.contains(user.email))
                                            and (myEmail == null || myEmail != user.email)}"
                                  th:action="@{'/admin/users/' + ${user.email} + '/delete'}"
                                  method="post"
                                  onsubmit="return confirm('本当に削除しますか?');"
                                  class="user-actions user-actions--delete">
                                <button type="submit" class="btn btn-danger btn-sm">削除</button>
                            </form>

                        </div>
                    </td>
                </tr>
                </tbody>

            </table>
        </div>

        <div class="form-actions mt-16">
            <a th:href="@{/admin/users/new}" class="btn">新規ユーザー登録</a>
            <a th:if="${hasUsers}"
               th:href="@{/admin/users/sort}"
               class="btn">並べ替え</a>
            <a th:href="@{/}" class="btn btn-secondary">ホームへ戻る</a>
        </div>

    </main>

</th:block>
</body>
</html>
