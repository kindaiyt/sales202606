<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>店舗管理</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<th:block layout:fragment="content">

    <main class="content">
        <h1>店舗一覧</h1>

        <table>
            <thead>
            <tr>
                <th>店舗名</th>
                <th>店舗URL</th>
                <th>店員割り当て</th>
                <th>削除</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="store : ${stores}">
                <td th:text="${store.name}"></td>
                <td th:text="${store.url}"></td>
                <td><a th:href="@{/admin/stores/{id}/assign(id=${store.id})}" class="btn">割り当て</a></td>
                <td>
                    <form th:action="@{'/admin/stores/' + ${store.id} + '/delete'}"
                          method="post"
                          onsubmit="return confirm('本当に削除しますか？');">
                        <button type="submit" class="btn btn-danger">削除</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="actions">
            <a th:href="@{/admin/stores/new}" class="btn">新しい店舗を作成</a>
            <a href="/" class="btn btn-secondary">ホームへ戻る</a>
        </div>
    </main>

</th:block>
</body>
</html>
