<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>店舗管理</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<th:block layout:fragment="content">

    <main class="content">
        <h1>店舗一覧</h1>

        <div class="table-card">
            <table class="store-table">
                <thead>
                <tr>
                    <th>店舗名</th>
                    <th>店舗の説明</th>
                    <th>所属している人</th>
                    <th class="col-actions">操作</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="store : ${stores}">
                    <!-- 店舗名 -->
                    <td class="cell-name" data-label="店舗名" th:text="${store.name}"></td>

                    <!-- 店舗の説明（空なら - ） -->
                    <td data-label="店舗の説明"
                        th:text="${#strings.isEmpty(store.note) ? '-' : store.note}">
                    </td>

                    <!-- 所属ユーザー -->
                    <td data-label="所属している人">

                        <!-- 誰もいない -->
                        <div th:if="${store.userStores == null or #lists.isEmpty(store.userStores)}">
                            -
                        </div>

                        <!-- 1人ずつ縦に表示 -->
                        <div th:if="${store.userStores != null and !#lists.isEmpty(store.userStores)}"
                             th:each="us : ${store.userStores}">

                            <span th:text="${us.user.name != null ? us.user.name : us.user.email}"></span>

                        </div>

                    </td>


                    <!-- 操作 -->
                    <td class="cell-actions" data-label="操作">
                        <div class="row-actions">
                            <a th:href="@{/admin/stores/{id}/edit(id=${store.id})}" class="btn btn-sm">割り当て</a>

                            <form th:action="@{'/admin/stores/' + ${store.id} + '/delete'}"
                                  method="post"
                                  onsubmit="return confirm('本当に削除しますか？');">
                                <button type="submit" class="btn btn-sm btn-danger">削除</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="form-actions mt-16">
            <a th:href="@{/admin/stores/new}" class="btn">新しい店舗を作成</a>
            <a href="/" class="btn btn-secondary">ホームへ戻る</a>
        </div>
    </main>

</th:block>
</body>
</html>
