<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>店舗情報編集</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<th:block layout:fragment="content">

    <main class="content">
        <h1>店舗情報編集</h1>

        <form th:action="@{/admin/stores/{url}/edit/info(url=${store.url})}" method="post" enctype="multipart/form-data">

            <!-- 店舗名 -->
            <div class="form-group">
                <label for="name">店舗名: </label>

                <input type="text"
                       id="name"
                       name="name"
                       placeholder="ここに店舗名を入力"
                       th:value="${name != null ? name : store.name}">

                <!-- 店舗名エラー -->
                <div th:if="${nameError}" class="error-message" th:text="${nameError}"></div>
            </div>

            <!-- 店舗URL -->
            <div class="form-group">
                <label for="newUrl">店舗URL: </label>

                <input type="text"
                       id="newUrl"
                       name="newUrl"
                       placeholder="ここに店舗URLを入力"
                       th:value="${newUrl != null ? newUrl : store.url}">

                <!-- URLエラー -->
                <div th:if="${urlError}" class="error-message" th:text="${urlError}"></div>
            </div>

            <div class="form-group">
                <label for="locationName">文化祭中の場所を入力（例: 中庭、北校舎1階調理実習室）（省略可）: </label>
                <input type="text"
                       id="locationName"
                       name="locationName"
                       placeholder="ここに店舗の場所を入力（省略可）"
                       th:value="${locationName != null ? locationName : store.locationName}">
            </div>

            <div class="form-group">
                <label>店舗種別: </label>

                <fieldset class="radio-inline-group">

                    <input id="storeType-student"
                           class="radio-inline__input"
                           type="radio"
                           name="storeType"
                           value="STUDENT"
                           th:checked="${store.storeType.name() == 'STUDENT'}" />

                    <label class="radio-inline__label" for="storeType-student">
                        学生店舗
                    </label>

                    <input id="storeType-general"
                           class="radio-inline__input"
                           type="radio"
                           name="storeType"
                           value="GENERAL"
                           th:checked="${store.storeType.name() == 'GENERAL'}" />

                    <label class="radio-inline__label" for="storeType-general">
                        一般店舗
                    </label>

                </fieldset>

                <div th:if="${storeTypeError}" class="error-message" th:text="${storeTypeError}"></div>
            </div>

            <div class="form-group" th:if="${!#strings.isEmpty(store.locationImageUrl)}">
                <label>現在の場所画像: </label>
                <div>
                    <img th:src="@{${store.locationImageUrl}}"
                         alt="現在保存されている画像"
                         class="clickable-image"
                         style="max-width: 320px; width: 100%; height: auto;">
                </div>
            </div>

            <div class="form-group">
                <label for="locationImage">新たに設定する画像: </label>

                <input type="file"
                       id="locationImage"
                       name="locationImage"
                       accept="image/png,image/jpeg,image/webp"
                       class="file-input">

                <div class="file-select-row">
                    <label for="locationImage" id="file-button" class="file-button">
                        ファイルを選択
                    </label>

                    <span id="file-name" class="file-name">未選択</span>
                </div>

                <img id="location-image-preview"
                     alt="選択した画像のプレビュー"
                     class="location-image-preview clickable-image"
                     style="display: none;">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn">更新</button>
                <a th:href="@{/admin/stores/{url}/edit(url=${store.url})}" class="btn btn-secondary">戻る</a>
            </div>

        </form>
        <div id="image-modal" class="image-modal">
            <img id="image-modal-img" class="image-modal-img" alt="拡大画像">
        </div>
    </main>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const input = document.getElementById("locationImage");
            const fileName = document.getElementById("file-name");
            const fileButton = document.getElementById("file-button");
            const preview = document.getElementById("location-image-preview");

            input.addEventListener("change", function () {
                const file = input.files.length > 0 ? input.files[0] : null;

                if (file) {
                    fileName.textContent = file.name;
                    fileButton.classList.add("is-selected");

                    preview.src = URL.createObjectURL(file);
                    preview.style.display = "block";
                } else {
                    fileName.textContent = "未選択";
                    fileButton.classList.remove("is-selected");

                    preview.removeAttribute("src");
                    preview.style.display = "none";
                }
            });
        });
    </script>
    <script th:src="@{/js/image-modal.js}"></script>
</th:block>
</body>
</html>
