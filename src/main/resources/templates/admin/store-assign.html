<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<th:block layout:fragment="content">
    <main class="content">
        <h1>店舗割り当て</h1>

        <!-- 店舗情報 -->
        <div class="store-info">
            <p><b>店舗名：</b><span th:text="${store.name}"></span></p>
            <p><b>店舗URL：</b><span th:text="${store.url}"></span></p>
        </div>

        <!-- 現在所属ユーザー -->
        <h2 class="section-title">現在所属しているユーザー</h2>

        <div th:if="${#lists.isEmpty(store.userStores)}" class="store-info">
            未割り当てです。
        </div>

        <div th:if="${!#lists.isEmpty(store.userStores)}" class="assign-users">
            <div th:each="us : ${store.userStores}" class="assign-chip">
                <div class="assign-chip-text">
                    <div class="assign-name" th:text="${us.user.name}">User Name</div>
                    <div class="assign-email" th:text="${us.user.email}">email@example.com</div>
                </div>

                <form th:action="@{/admin/stores/{id}/assign/remove(id=${store.id})}" method="post" class="assign-chip-form">
                    <input type="hidden" name="userEmail" th:value="${us.user.email}">
                    <button type="submit" class="btn btn-secondary">解除</button>
                </form>
            </div>
        </div>

        <!-- 追加 -->
        <h2 class="section-title">ユーザーを追加</h2>

        <form th:action="@{/admin/stores/{id}/assign/add(id=${store.id})}" method="post" class="assign-add">
            <label for="userEmail">追加するユーザー：</label>

            <select id="userEmail" name="userEmail" required>
                <option value="">選択してください</option>
                <option th:each="u : ${users}"
                        th:value="${u.email}"
                        th:text="${u.name + '（' + u.email + '）'}">
                </option>
            </select>

            <button type="submit" class="btn">追加</button>
        </form>

        <div class="actions">
            <a th:href="@{/admin/stores}" class="btn btn-secondary">店舗一覧へ戻る</a>
        </div>
    </main>
</th:block>
</body>
</html>
