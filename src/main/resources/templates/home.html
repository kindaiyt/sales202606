<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>ホーム</title>
</head>
<body>
<main layout:fragment="content" class="content">
    <h1 class="page-title">ホームページ</h1>

    <div th:if="${userName == 'ゲスト'}">
        ようこそ、ゲストさん
    </div>

    <div th:if="${userName != 'ゲスト'}" class="store-info">
        ようこそ、[[${userName}]] さん
        <p>あなたの店舗一覧を確認する場合は、下記リンクから移動してください。</p>

        <div class="home-actions">
            <a th:href="@{/store}" class="btn">自分の店舗一覧へ</a>
            <a th:if="${isAdmin}" th:href="@{/admin/stores}" class="btn">店舗一覧・作成</a>
        </div>
    </div>

    <div th:if="${userName == 'ゲスト'}" class="store-info">
        <p>店舗情報が表示されていないか、ログインしていません。<br>
            ログインしていない場合、右上のメニューからログインしてください。</p>
    </div>
</main>
</body>
</html>
